  <text x="40" y="525" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9">petar@velkovski.xyz</text>
  
  <text x="20" y="545" font-family="'Courier New', monospace" font-size="11" fill="#50fa7b">💼</text>
  <text x="40" y="545" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9">linkedin.com/in/velkovskipetar</text>
  
  <text x="20" y="565" font-family="'Courier New', monospace" font-size="11" fill="#50fa7b">📸</text>
  <text x="40" y="565" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9">instagram.com/velkovskiiiii</text>
  
  <!-- Footer prompt -->
  <text x="20" y="595" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">peeetar@github</text>
  <text x="110" y="595" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">:~$</text>
  <text x="140" y="595" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9" opacity="0.5">_</text>
