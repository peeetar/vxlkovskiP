<svg width="550" height="680" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="750" height="680" fill="#0d1117" rx="8"/>
  <rect width="750" height="30" fill="#161b22" rx="8"/>
  
  <!-- Traffic lights -->
  <circle cx="16" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="15" r="6" fill="#28c840"/>
  
  <!-- Terminal content -->
  <text x="20" y="60" font-family="'Courier New', monospace" font-size="12" fill="#79c0ff" font-weight="bold">$ whoami</text>
  <text x="20" y="80" font-family="'Courier New', monospace" font-size="12" fill="#c9d1d9">petar velkovski (/ˈpɛ.tar/)</text>
  
  <!-- Tree structure -->
  <text x="20" y="105" font-family="'Courier New', monospace" font-size="12" fill="#79c0ff" font-weight="bold">$ tree skills/</text>
  
  <text x="20" y="125" font-family="'Courier New', monospace" font-size="12" fill="#c9d1d9">skills/</text>
  
  <text x="20" y="145" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">├─</text>
  <text x="40" y="145" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" font-weight="bold">languages/</text>
  <text x="20" y="165" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">│  ├─</text>
  <text x="50" y="165" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">C# • Java • TypeScript • HTML5 • R • Markdown</text>
  
  <text x="20" y="185" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">├─</text>
  <text x="40" y="185" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" font-weight="bold">frameworks/</text>
  <text x="20" y="205" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">│  ├─</text>
  <text x="50" y="205" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Astro • .NET • Flask • Node.js • WordPress</text>
  
  <text x="20" y="225" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">├─</text>
  <text x="40" y="225" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" font-weight="bold">databases/</text>
  <text x="20" y="245" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">│  ├─</text>
  <text x="50" y="245" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Oracle SQL • MongoDB • PostgreSQL</text>
  
  <text x="20" y="265" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">├─</text>
  <text x="40" y="265" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" font-weight="bold">homelab/</text>
  <text x="20" y="285" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">│  ├─</text>
  <text x="50" y="285" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Proxmox • Tailscale • Docker • Home Assistant • RPi</text>
  
  <text x="20" y="305" font-family="'Courier New', monospace" font-size="11" fill="#79c0ff">└─</text>
  <text x="40" y="305" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" font-weight="bold">design/</text>
  <text x="20" y="325" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">   ├─</text>
  <text x="50" y="325" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Affinity Designer • Affinity Photo • TouchDesigner</text>
  <text x="20" y="342" font-family="'Courier New', monospace" font-size="10" fill="#79c0ff">   └─</text>
  <text x="50" y="342" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Canva • Figma</text>
  
  <!-- Summary section -->
