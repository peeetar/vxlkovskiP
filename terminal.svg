  <text x="20" y="390" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">
    <tspan x="20" dy="0">I'm a CS student passionate about systems administration and</tspan>
    <tspan x="20" dy="14">managing homelabs. I love gainging experience across the whole stack</tspan>
    <tspan x="20" dy="14">from backend frameworks like .NET and Flask to frontend tools like</tspan>
    <tspan x="20" dy="14">Astro and TypeScript. When I'm not studying, you'll probably find me</tspan>
    <tspan x="20" dy="14">tinkering with Proxmox, Docker containers, or designing</tspan>
    <tspan x="20" dy="14">funny ideas in Figma. Open to projects and work!</tspan>
  </text>
  
  <!-- Contact section -->
